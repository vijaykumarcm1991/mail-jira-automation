{% extends "base.html" %}

{% block content %}

<div x-data="dashboardApp()" x-init="init()">

    <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Dashboard</h2>
        <span class="text-sm text-gray-500" x-show="!isAdmin">Read-only public view</span>
    </div>

    <div class="bg-white shadow rounded overflow-auto max-h-96">
    <table class="min-w-full">
        <thead class="sticky top-0 bg-gray-200">
            <tr class="bg-gray-200 text-left">
                <th class="p-2">Internal ID</th>
                <th class="p-2">Summary</th>
                <th class="p-2">JSM ID</th>
                <th class="p-2">JIRA ID</th>
            </tr>
        </thead>

        <tbody>
            <template x-for="t in tickets" :key="t.internal_id">
                <tr class="border-t">
                    <td class="p-2" x-text="t.internal_id"></td>
                    <td class="p-2" x-text="t.subject"></td>
                    <!-- ✅ JSM ID + STATUS -->
                    <td class="p-2">
                        <a :href="jiraBaseUrl + '/browse/' + t.jira_id"
                            target="_blank"
                            class="text-blue-600 hover:underline">
                            <span x-text="t.jira_id"></span>
                        </a>
                        <div class="text-xs text-gray-500" x-text="t.status"></div>
                    </td>

                    <!-- ✅ L3 JIRA ID + STATUS -->
                    <td class="p-2">
                        <a :href="l3BaseUrl ? l3BaseUrl + '/browse/' + t.l3_jira_id : '#'"
                            target="_blank"
                            class="text-blue-600 hover:underline"
                            x-show="t.l3_jira_id">
                            <span x-text="t.l3_jira_id"></span>
                        </a>
                        <div class="text-xs text-gray-500" x-text="t.l3_status"></div>

                        <!-- optional fallback -->
                        <template x-if="!t.l3_jira_id">
                            <span class="text-gray-400 text-xs">N/A</span>
                        </template>
                    </td>
                </tr>
            </template>
        </tbody>
    </table>
    </div>

    <div class="bg-white p-4 rounded shadow mt-6 max-h-96 overflow-auto">

        <h3 class="font-semibold mb-3">Rule Execution Logs</h3>

        <template x-for="log in logs">
            <div class="border p-2 mb-2 rounded text-sm">

                <div>
                    <strong x-text="log.internal_id"></strong>
                    →
                    <span x-text="log.rule_name || 'No Rule Matched'"></span>
                </div>

                <div class="text-gray-500">
                    <span x-text="new Date(log.timestamp).toLocaleString()"></span>
                </div>

                <div>
                    Actions:
                    <span x-text="JSON.stringify(log.actions || {})"></span>
                </div>

            </div>
        </template>

    </div>

    <div class="bg-white p-4 rounded shadow mt-6 max-h-96 overflow-auto">

        <h3 class="font-semibold mb-3">Failed Jobs</h3>

        <template x-for="job in failedJobs" :key="job._id">
            <div class="border p-2 mb-2 rounded text-sm">

                <div>
                    <strong x-text="job.type"></strong>
                    →
                    Retry: <span x-text="job.retry_count"></span>
                </div>

                <div class="text-red-500" x-text="job.error"></div>

                <button
                    x-show="isAdmin"
                    @click="retryJob(job._id)"
                    class="bg-blue-600 text-white px-2 py-1 mt-2 rounded text-xs">
                    Retry
                </button>

            </div>
        </template>

    </div>

</div>

<script>
function dashboardApp() {
    return {
        tickets: [],
        logs: [],
        failedJobs: [],
        isAdmin: {{ "true" if is_admin else "false" }},
        jiraBaseUrl: "{{ jira_base_url }}",
        l3BaseUrl: "{{ l3_jira_base_url }}",
        async init() {
            await this.loadTickets()
            await this.loadLogs()
            await this.loadFailedJobs()

            // ✅ Auto refresh every 10 seconds
            setInterval(() => {
                this.loadTickets()
                this.loadLogs()
                this.loadFailedJobs()
            }, 10000)
        },

        async loadTickets() {
            const res = await fetch('/api/tickets')
            this.tickets = await res.json()
        },

        async loadLogs() {
            const res = await fetch('/api/rule-logs')
            this.logs = await res.json()
        },

        async loadFailedJobs() {
            const res = await fetch('/api/failed-jobs')
            this.failedJobs = await res.json()
        },

        async retryJob(id) {
            if (!this.isAdmin) return
            await fetch(`/api/retry-job/${id}`, { method: 'POST' })
            await this.loadFailedJobs()
        }
    }
}
</script>

{% endblock %}
