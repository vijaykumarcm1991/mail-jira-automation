{% extends "base.html" %}

{% block content %}

<div x-data="mailboxesApp()" x-init="loadMailboxes()" class="max-w-6xl mx-auto">

    <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Mailboxes</h2>
        <button @click="resetForm"
                class="bg-blue-600 text-white px-3 py-1 rounded text-sm">
            New Mailbox
        </button>
    </div>

    <div class="bg-white p-5 rounded shadow mb-6">
        <h3 class="font-semibold text-lg mb-3" x-text="form._id ? 'Edit Mailbox' : 'Add Mailbox'"></h3>

        <div class="grid grid-cols-3 gap-3">
            <input x-model="form.name"
                   placeholder="Display name"
                   class="border p-2">

            <input x-model="form.email"
                   type="email"
                   placeholder="Mailbox email"
                   class="border p-2">

            <input x-model="form.password"
                   type="password"
                   :placeholder="form._id ? 'Mailbox password (leave blank to keep)' : 'Mailbox password'"
                   class="border p-2">

            <input x-model="form.imap_server"
                   placeholder="IMAP server"
                   class="border p-2">

            <input x-model="form.smtp_host"
                   placeholder="SMTP host"
                   class="border p-2">

            <input x-model.number="form.smtp_port"
                   type="number"
                   min="1"
                   placeholder="SMTP port"
                   class="border p-2">

            <input x-model="form.smtp_user"
                   placeholder="SMTP user"
                   class="border p-2">

            <input x-model="form.smtp_password"
                   type="password"
                   :placeholder="form._id ? 'SMTP password (leave blank to keep)' : 'SMTP password'"
                   class="border p-2">

            <label class="flex items-center gap-2">
                <input type="checkbox" x-model="form.enabled">
                <span>Enabled</span>
            </label>
        </div>

        <div class="flex gap-2 mt-4">
            <button @click="saveMailbox"
                    class="bg-green-600 text-white px-4 py-2 rounded">
                Save
            </button>
            <button @click="resetForm"
                    class="border px-4 py-2 rounded">
                Clear
            </button>
        </div>

        <div class="text-red-600 text-sm mt-3" x-text="error"></div>
        <div class="text-green-700 text-sm mt-3" x-text="message"></div>
    </div>

    <div class="bg-white p-4 rounded shadow">
        <h3 class="font-semibold mb-3">Configured Mailboxes</h3>

        <template x-if="mailboxes.length === 0">
            <div class="text-sm text-gray-500">
                No UI mailboxes configured. The scheduler will continue using the environment mailbox if configured.
            </div>
        </template>

        <template x-for="mailbox in mailboxes" :key="mailbox._id">
            <div class="border p-3 mb-3 rounded">
                <div class="grid grid-cols-5 gap-3 items-center">
                    <div>
                        <div class="font-semibold" x-text="mailbox.name || mailbox.email"></div>
                        <div class="text-xs text-gray-500" x-text="mailbox.email"></div>
                    </div>

                    <div class="text-sm">
                        <div x-text="mailbox.imap_server"></div>
                        <div class="text-xs text-gray-500" x-text="`${mailbox.smtp_host}:${mailbox.smtp_port}`"></div>
                    </div>

                    <div>
                        <span class="text-xs px-2 py-1 rounded"
                              :class="mailbox.enabled ? 'bg-green-100 text-green-800' : 'bg-gray-200 text-gray-700'"
                              x-text="mailbox.enabled ? 'Enabled' : 'Disabled'"></span>
                    </div>

                    <div>
                        <input x-model="mailbox.test_recipient"
                               type="email"
                               placeholder="Test recipient"
                               class="border p-2 w-full text-sm">
                    </div>

                    <div class="flex gap-2 justify-end">
                        <button @click="testMailbox(mailbox)"
                                class="text-green-700 text-sm">Test</button>
                        <button @click="editMailbox(mailbox)"
                                class="text-blue-600 text-sm">Edit</button>
                        <button @click="deleteMailbox(mailbox)"
                                class="text-red-600 text-sm">Delete</button>
                    </div>
                </div>
                <div class="text-sm mt-2"
                     :class="mailbox.test_error ? 'text-red-600' : 'text-green-700'"
                     x-text="mailbox.test_error || mailbox.test_message"></div>
            </div>
        </template>
    </div>

</div>

<script>
function mailboxesApp() {
    return {
        mailboxes: [],
        error: "",
        message: "",
        form: {},

        async loadMailboxes() {
            const res = await fetch('/api/mailboxes')
            this.mailboxes = await res.json()
            this.mailboxes.forEach(m => {
                m.test_recipient = m.email
                m.test_message = ""
                m.test_error = ""
            })
            this.resetForm()
        },

        resetForm() {
            this.error = ""
            this.message = ""
            this.form = {
                _id: "",
                name: "",
                email: "",
                password: "",
                imap_server: "",
                smtp_host: "",
                smtp_port: 465,
                smtp_user: "",
                smtp_password: "",
                enabled: true
            }
        },

        editMailbox(mailbox) {
            this.error = ""
            this.message = ""
            this.form = {
                _id: mailbox._id,
                name: mailbox.name || "",
                email: mailbox.email || "",
                password: "",
                imap_server: mailbox.imap_server || "",
                smtp_host: mailbox.smtp_host || "",
                smtp_port: mailbox.smtp_port || 465,
                smtp_user: mailbox.smtp_user || mailbox.email || "",
                smtp_password: "",
                enabled: mailbox.enabled
            }
        },

        payload() {
            const data = {...this.form}
            delete data._id
            if (!data.password) delete data.password
            if (!data.smtp_password) delete data.smtp_password
            return data
        },

        async saveMailbox() {
            this.error = ""
            this.message = ""
            const url = this.form._id ? `/api/mailboxes/${this.form._id}` : '/api/mailboxes'
            const method = this.form._id ? 'PUT' : 'POST'
            const res = await fetch(url, {
                method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(this.payload())
            })

            if (!res.ok) {
                const data = await res.json()
                this.error = data.detail || "Unable to save mailbox"
                return
            }

            this.message = "Mailbox saved"
            await this.loadMailboxes()
        },

        async testMailbox(mailbox) {
            mailbox.test_error = ""
            mailbox.test_message = "Testing..."

            const res = await fetch(`/api/mailboxes/${mailbox._id}/test`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({recipient: mailbox.test_recipient})
            })

            const data = await res.json()
            if (!res.ok) {
                mailbox.test_message = ""
                mailbox.test_error = data.detail || "Mailbox test failed"
                return
            }

            mailbox.test_message = data.message
        },

        async deleteMailbox(mailbox) {
            this.error = ""
            this.message = ""
            const res = await fetch(`/api/mailboxes/${mailbox._id}`, {method: 'DELETE'})

            if (!res.ok) {
                const data = await res.json()
                this.error = data.detail || "Unable to delete mailbox"
                return
            }

            await this.loadMailboxes()
        }
    }
}
</script>

{% endblock %}
